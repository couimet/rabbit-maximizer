name: rabbit-maximizer-restacker

on:
  pull_request_target:
    types: [edited]

permissions:
  contents: read
  pull-requests: write

jobs:
  restack:
    if: github.event.changes.base != null && github.event.changes.base.ref.to == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Request CodeRabbit full review
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.event.repository.full_name }}
          GITHUB_TOKEN: ${{ github.token }}
          TRIGGER: base-changed-to-main
          METADATA: '{"previous_base": "${{ github.event.changes.base.ref.from }}"}'
        run: bash .github/actions/request-coderabbit-full-review/request-coderabbit-full-review.sh
