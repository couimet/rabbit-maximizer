name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  ci:
    uses: couimet/github-actions/.github/workflows/typescript-ci-checks.yml@main
    permissions:
      contents: read
      pull-requests: write
    with:
      pre-install-command: 'cp .env.ci .env'
      test-command: 'pnpm ci:test'

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: couimet/github-actions/shellcheck@main

  check-generated-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: couimet/github-actions/setup-node-pnpm@main
      - run: cp .env.ci .env
      - uses: couimet/github-actions/install-deps@main
      - uses: couimet/github-actions/check-generated-drift@main
        with:
          command: 'pnpm ci:check-generated-drift'
          github-token: ${{ secrets.GITHUB_TOKEN }}

  bats-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: couimet/github-actions/bats-test@main
        with:
          test-directory: bats-tests
          github-token: ${{ secrets.GITHUB_TOKEN }}
