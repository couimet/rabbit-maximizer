openapi: '3.1.0'
info:
  title: Rabbit Maximizer API
  version: '0.1.0'
servers:
  - url: http://localhost:3000
    description: Local dev server

paths:
  /api/summary:
    get:
      operationId: getSummary
      parameters:
        - name: duration
          in: query
          schema:
            type: string
            enum: [24h, 2d, 3d, 5d, 1w]
            default: 24h
      responses:
        '200':
          description: Aggregate status summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Summary'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/queue:
    get:
      operationId: getQueue
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Paginated queue items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedQueue'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/queue/order:
    get:
      operationId: getQueueOrder
      responses:
        '200':
          description: Pending items in effective order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueueOrderResponse'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/queue/order/move:
    post:
      operationId: moveQueueOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueueOrderMoveRequest'
      responses:
        '200':
          description: Updated effective order after move
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueueOrderResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Queue items not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/events:
    get:
      operationId: getEvents
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        '200':
          description: Paginated events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEvents'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/state/next_review_available_at:
    get:
      operationId: getNextReviewAvailable
      responses:
        '200':
          description: Next review availability timestamp
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StateResponse'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  responses:
    InternalError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
      additionalProperties: false

    QueueStatus:
      type: string
      enum: [pending, posted, completed, failed]

    QueueItem:
      type: object
      required:
        - id
        - uuid
        - repo_full_name
        - pr_number
        - status
        - not_before
        - attempts
        - created_at
        - updated_at
      properties:
        id:
          type: integer
        uuid:
          type: string
        repo_full_name:
          type: string
        pr_number:
          type: integer
        status:
          $ref: '#/components/schemas/QueueStatus'
        not_before:
          type: string
          format: date-time
          description: Eligibility gate — item cannot be processed before this timestamp
        attempts:
          type: integer
        source_comment_url:
          type: string
        posted_at:
          type: string
          format: date-time
          nullable: true
        failed_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      additionalProperties: false

    EventType:
      type: string
      enum: [detected, enqueued, posted, bypassed, completed, failed]

    EventEntry:
      type: object
      required:
        - id
        - uuid
        - ts
        - type
        - repo_full_name
        - pr_number
        - correlation_id
        - version
        - payload
      properties:
        id:
          type: integer
        uuid:
          type: string
        ts:
          type: string
          format: date-time
        type:
          $ref: '#/components/schemas/EventType'
        repo_full_name:
          type: string
        pr_number:
          type: integer
        correlation_id:
          type: string
        request_id:
          type: string
        version:
          type: string
        metadata:
          type: object
          additionalProperties: true
        payload:
          type: object
          additionalProperties: true
      additionalProperties: false

    QueueCounts:
      type: object
      required: [pending, posted, failed]
      properties:
        pending:
          type: integer
        posted:
          type: integer
        failed:
          type: integer
      additionalProperties: false

    EventCounts:
      type: object
      required: [detected, enqueued, posted, failed]
      properties:
        detected:
          type: integer
        enqueued:
          type: integer
        posted:
          type: integer
        failed:
          type: integer
      additionalProperties: false

    Summary:
      type: object
      required: [queueCounts, eventCounts, oldestPending]
      properties:
        queueCounts:
          $ref: '#/components/schemas/QueueCounts'
        eventCounts:
          $ref: '#/components/schemas/EventCounts'
        oldestPending:
          oneOf:
            - $ref: '#/components/schemas/QueueItem'
            - type: 'null'
      additionalProperties: false

    PaginatedQueue:
      type: object
      required: [data, total, page, pageSize]
      properties:
        data:
          type: array
          maxItems: 100
          items:
            $ref: '#/components/schemas/QueueItem'
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
      additionalProperties: false

    PaginatedEvents:
      type: object
      required: [data, total, page, pageSize]
      properties:
        data:
          type: array
          maxItems: 100
          items:
            $ref: '#/components/schemas/EventEntry'
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer
      additionalProperties: false

    QueueOrderMoveRequest:
      type: object
      required: [queueItemIds, direction]
      properties:
        queueItemIds:
          type: array
          minItems: 1
          maxItems: 100
          items:
            type: integer
        direction:
          type: string
          enum: [up, down]
      additionalProperties: false

    QueueOrderResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/QueueItem'
      additionalProperties: false

    StateResponse:
      type: object
      required: [next_review_available_at]
      properties:
        next_review_available_at:
          type: string
          format: date-time
          nullable: true
      additionalProperties: false
